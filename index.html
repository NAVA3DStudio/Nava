<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NAVA Studio Portfolio</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    body { font-family: Inter, Arial, sans-serif; background:#0f1115; color:#e6e6e6; margin:0; padding:40px; }
    .wrap { max-width: 1100px; margin: 0 auto; text-align: center; }
    .login { max-width: 420px; margin: 120px auto; background:#161a22; padding:24px; border-radius:12px; text-align:center; }
    button, input { padding:10px 12px; border-radius:8px; border:none; }
    button { cursor:pointer; background:#7aa2ff; color:#0f1115; font-weight:bold; }
    input { background:#0f1115; color:#e6e6e6; border:1px solid #2a2f3a; margin-right:8px; width:180px; }
    .card { background:#161a22; padding:24px; border-radius:16px; margin-bottom:28px; text-align: left; }
    h2, h3 { margin-top: 0; }
    .grid { 
      display:grid; 
      grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); 
      gap:18px; 
    }
    .grid img {
      transition: transform .2s ease, box-shadow .2s ease;
      cursor: pointer;
      width:100%;
      border-radius:10px;
    }
    .grid img:hover {
      transform: scale(1.03);
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }
    .meta { color:#9aa4b2; font-size:14px; margin-bottom: 16px; }
    .section-title { 
      font-size: 24px; 
      margin-bottom: 8px; 
      color: #7aa2ff;
    }
    .project-name {
      font-size: 28px;
      margin: 0 0 8px 0;
      font-weight: 600;
    }
    hr {
      border-color: #2a2f3a;
      margin: 24px 0;
    }
    /* Навигация */
    .nav-arrow {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      font-size: 48px;
      color: white;
      background: rgba(0,0,0,0.5);
      padding: 16px 24px;
      cursor: pointer;
      z-index: 10000;
      user-select: none;
      border-radius: 8px;
      transition: background 0.2s;
    }
    .nav-arrow:hover { background: rgba(0,0,0,0.8); }
    .nav-left { left: 20px; }
    .nav-right { right: 20px; }
    
    /* Кнопки зума */
    .zoom-controls {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: flex;
      gap: 10px;
      z-index: 10000;
    }
    .zoom-btn {
      background: rgba(0,0,0,0.6);
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }
    .zoom-btn:hover { background: rgba(0,0,0,0.9); }
    
    .image-counter {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      background: rgba(0,0,0,0.6);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      z-index: 10000;
      font-family: monospace;
    }
    
    .zoom-indicator {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(0,0,0,0.5);
      padding: 5px 10px;
      border-radius: 8px;
      font-size: 12px;
      color: white;
      z-index: 10000;
    }
  </style>
</head>
<body>

<div id="login" class="login">
  <h2>NAVA Studio Portfolio</h2>
  <p>Private NDA-safe portfolio — for Wargaming viewing only</p>
  <input type="password" id="pw" placeholder="Password" />
  <button onclick="checkPw()">Enter</button>
</div>

<div id="content" class="wrap" style="display:none;">
  
  <div class="card">
    <div class="section-title">Skin</div>
    
    <div class="project-name">Binah</div>
    <div class="meta">Work samples — for Wargaming viewing only</div>
    <div class="grid">
      <img src="1.gif" alt="Binah 1" data-fullidx="0" onclick="openLightbox(0)">
      <img src="2.gif" alt="Binah 2" data-fullidx="1" onclick="openLightbox(1)">
      <img src="3.gif" alt="Binah 3" data-fullidx="2" onclick="openLightbox(2)">
    </div>
    <hr>

    <div class="project-name">Corona</div>
    <div class="meta">Work samples — for Wargaming viewing only</div>
    <div class="grid">
      <img src="4.gif" alt="Corona 1" data-fullidx="3" onclick="openLightbox(3)">
      <img src="5.gif" alt="Corona 2" data-fullidx="4" onclick="openLightbox(4)">
      <img src="6.gif" alt="Corona 3" data-fullidx="5" onclick="openLightbox(5)">
    </div>
    <hr>

    <div class="project-name">Corals</div>
    <div class="meta">Work samples — for Wargaming viewing only</div>
    <div class="grid">
      <img src="7.gif" alt="Corals 1" data-fullidx="6" onclick="openLightbox(6)">
      <img src="8.gif" alt="Corals 2" data-fullidx="7" onclick="openLightbox(7)">
      <img src="9.gif" alt="Corals 3" data-fullidx="8" onclick="openLightbox(8)">
    </div>
    <hr>

    <div class="project-name">Blücher</div>
    <div class="meta">Work samples — for Wargaming viewing only</div>
    <div class="grid">
      <img src="10.gif" alt="Blücher 1" data-fullidx="9" onclick="openLightbox(9)">
      <img src="11.gif" alt="Blücher 2" data-fullidx="10" onclick="openLightbox(10)">
      <img src="12.gif" alt="Blücher 3" data-fullidx="11" onclick="openLightbox(11)">
    </div>
  </div>
</div>

<script>
  const correctPw = "WG0070707";

  // Все изображения в правильном порядке
  const allImages = [
    "1.gif", "2.gif", "3.gif",  // Binah
    "4.gif", "5.gif", "6.gif",  // Corona
    "7.gif", "8.gif", "9.gif",  // Corals
    "10.gif", "11.gif", "12.gif"  // Blücher
  ];

  let currentIndex = 0;
  let currentZoom = 1;

  function openLightbox(index) {
    currentIndex = index;
    currentZoom = 1;
    const lb = document.getElementById("lightbox");
    const img = document.getElementById("lightbox-img");
    img.src = allImages[currentIndex];
    img.style.transform = `scale(${currentZoom})`;
    lb.style.display = "flex";
    updateCounter();
    updateZoomIndicator();
  }

  function closeLightbox() {
    document.getElementById("lightbox").style.display = "none";
  }

  function nextImage() {
    currentIndex = (currentIndex + 1) % allImages.length;
    currentZoom = 1;
    document.getElementById("lightbox-img").src = allImages[currentIndex];
    document.getElementById("lightbox-img").style.transform = `scale(${currentZoom})`;
    updateCounter();
    updateZoomIndicator();
  }

  function prevImage() {
    currentIndex = (currentIndex - 1 + allImages.length) % allImages.length;
    currentZoom = 1;
    document.getElementById("lightbox-img").src = allImages[currentIndex];
    document.getElementById("lightbox-img").style.transform = `scale(${currentZoom})`;
    updateCounter();
    updateZoomIndicator();
  }

  function zoomIn() {
    if (currentZoom < 4) {
      if (currentZoom === 1) currentZoom = 2;
      else if (currentZoom === 2) currentZoom = 4;
      document.getElementById("lightbox-img").style.transform = `scale(${currentZoom})`;
      updateZoomIndicator();
    }
  }

  function zoomOut() {
    if (currentZoom > 1) {
      if (currentZoom === 4) currentZoom = 2;
      else if (currentZoom === 2) currentZoom = 1;
      document.getElementById("lightbox-img").style.transform = `scale(${currentZoom})`;
      updateZoomIndicator();
    }
  }

  function resetZoom() {
    currentZoom = 1;
    document.getElementById("lightbox-img").style.transform = `scale(1)`;
    updateZoomIndicator();
  }

  function updateCounter() {
    const counter = document.getElementById("image-counter");
    if (counter) {
      counter.textContent = `${currentIndex + 1} / ${allImages.length}`;
    }
  }

  function updateZoomIndicator() {
    const indicator = document.getElementById("zoom-indicator");
    if (indicator) {
      indicator.textContent = `${currentZoom}x`;
    }
  }

  function checkPw() {
    const input = document.getElementById("pw").value;
    if (input === correctPw) {
      document.getElementById("login").style.display = "none";
      document.getElementById("content").style.display = "block";
    } else {
      alert("Incorrect password");
    }
  }

  // Обработка клавиатуры
  document.addEventListener("keydown", function(e) {
    const lb = document.getElementById("lightbox");
    if (lb.style.display === "flex") {
      if (e.key === "ArrowLeft") {
        prevImage();
        e.preventDefault();
      } else if (e.key === "ArrowRight") {
        nextImage();
        e.preventDefault();
      } else if (e.key === "Escape") {
        closeLightbox();
        e.preventDefault();
      } else if (e.key === "+" || e.key === "=") {
        zoomIn();
        e.preventDefault();
      } else if (e.key === "-" || e.key === "_") {
        zoomOut();
        e.preventDefault();
      } else if (e.key === "0") {
        resetZoom();
        e.preventDefault();
      }
    }
  });

  // Зум колесиком мыши
  document.addEventListener("wheel", function(e) {
    const lb = document.getElementById("lightbox");
    if (lb.style.display === "flex") {
      if (e.deltaY < 0) {
        zoomIn();
      } else if (e.deltaY > 0) {
        zoomOut();
      }
      e.preventDefault();
    }
  }, { passive: false });
</script>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox()" style="
  display:none;
  position:fixed;
  inset:0;
  background: rgba(0,0,0,0.9);
  z-index: 9999;
  align-items: center;
  justify-content: center;
  cursor: zoom-out;
">
  <div class="nav-arrow nav-left" onclick="event.stopPropagation(); prevImage();">◀</div>
  
  <div style="overflow: auto; max-width: 90vw; max-height: 90vh; display: flex; align-items: center; justify-content: center;">
    <img id="lightbox-img" src="" alt="" style="
      transition: transform 0.2s ease;
      cursor: zoom-in;
      max-width: none;
      width: auto;
      height: auto;
    " onclick="event.stopPropagation(); zoomIn();">
  </div>
  
  <div class="nav-arrow nav-right" onclick="event.stopPropagation(); nextImage();">►</div>
  
  <div class="zoom-controls">
    <button class="zoom-btn" onclick="event.stopPropagation(); zoomOut();">−</button>
    <button class="zoom-btn" onclick="event.stopPropagation(); resetZoom();">1x</button>
    <button class="zoom-btn" onclick="event.stopPropagation(); zoomIn();">+</button>
  </div>
  
  <div id="image-counter" class="image-counter"></div>
  <div id="zoom-indicator" class="zoom-indicator">1x</div>
</div>

</body>
</html>
