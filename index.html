<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NAVA Studio Portfolio</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    body { font-family: Inter, Arial, sans-serif; background:#0f1115; color:#e6e6e6; margin:0; padding:40px; }
    .wrap { max-width: 1100px; margin: 0 auto; text-align: center; }
    .login { max-width: 420px; margin: 120px auto; background:#161a22; padding:24px; border-radius:12px; text-align:center; }
    button, input { padding:10px 12px; border-radius:8px; border:none; }
    button { cursor:pointer; background:#7aa2ff; color:#0f1115; font-weight:bold; }
    input { background:#0f1115; color:#e6e6e6; border:1px solid #2a2f3a; margin-right:8px; width:180px; }
    .message { margin-top: 40px; font-size: 18px; color:#9aa4b2; }
    .card { background:#161a22; padding:24px; border-radius:16px; margin-bottom:28px; text-align: left; }
    h1, h2 { margin-top: 0; }
    .grid { 
      display:grid; 
      grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); 
      gap:18px; 
    }
    .grid img {
      transition: transform .2s ease, box-shadow .2s ease;
      cursor: zoom-in;
      width:100%;
      border-radius:10px;
    }
    .grid img:hover {
      transform: scale(1.03);
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }
    .meta { color:#9aa4b2; font-size:14px; }
    .warning { color:#ff7a7a; font-size:14px; margin-top:16px; border-top:1px solid #2a2f3a; padding-top:16px; }
  </style>
</head>
<body>

<div id="login" class="login">
  <h2>NAVA Studio Portfolio</h2>
  <p>Private NDA-safe portfolio — только для просмотра компании Wargaming</p>
  <input type="password" id="pw" placeholder="Password" />
  <button onclick="checkPw()">Enter</button>
</div>

<div id="content" class="wrap" style="display:none;">
  
  <div class="card">
    <h2>Портфолио NAVA Studio</h2>
    <div class="meta">Примеры работ — только для просмотра компании Wargaming</div>
    <div class="grid">
      <img src="53.png" alt="Portfolio image 1" onclick="openLightbox(this.src)">
      <img src="54.png" alt="Portfolio image 2" onclick="openLightbox(this.src)">
    </div>
  </div>

</div>

<script>
  const correctPw = "WG0070707";

  function openLightbox(src) {
    const lb = document.getElementById("lightbox");
    const img = document.getElementById("lightbox-img");
    img.src = src;
    lb.style.display = "flex";
  }

  function closeLightbox() {
    document.getElementById("lightbox").style.display = "none";
  }

  function checkPw() {
    const input = document.getElementById("pw").value;
    if (input === correctPw) {
      document.getElementById("login").style.display = "none";
      document.getElementById("content").style.display = "block";
    } else {
      alert("Incorrect password");
    }
  }
</script>

<!-- Lightbox для увеличения картинок -->
<div id="lightbox" onclick="closeLightbox()" style="
  display:none;
  position:fixed;
  inset:0;
  background: rgba(0,0,0,0.9);
  z-index: 9999;
  align-items: center;
  justify-content: center;
">
  <img id="lightbox-img" src="" alt="" style="
    max-width: 92vw;
    max-height: 92vh;
    width: auto;
    height: auto;
    object-fit: contain;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,.6);
    cursor: zoom-out;
  ">
</div>

</body>
</html>
