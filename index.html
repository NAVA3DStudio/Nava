<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NAVA Studio Portfolio</title>

<style>
body { font-family: Arial; background:#0f1115; color:#e6e6e6; margin:0; padding:40px; }
.wrap { max-width: 1200px; margin:auto; }
.grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.grid img { width:100%; border-radius:10px; cursor:pointer; }

.nav-arrow {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  font-size: 48px;
  color: white;
  background: rgba(0,0,0,0.5);
  padding: 16px;
  cursor: pointer;
  z-index: 10000;
}
.nav-left { left:20px; }
.nav-right { right:20px; }

#lightbox {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#lightbox img {
  max-width:90%;
  max-height:90%;
}

#image-counter {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  color:white;
}
</style>
</head>

<body>

<div class="wrap">
  <div class="grid">
    <img src="1.jpg" onclick="openLightbox(0)">
    <img src="2.jpg" onclick="openLightbox(1)">
    <img src="3.jpg" onclick="openLightbox(2)">
    <img src="4.jpg" onclick="openLightbox(3)">
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <span onclick="closeLightbox()" style="position:absolute;top:20px;right:30px;font-size:40px;cursor:pointer;">×</span>
  <img id="lightbox-img">

  <div class="nav-arrow nav-left" onclick="prevImage()">‹</div>
  <div class="nav-arrow nav-right" onclick="nextImage()">›</div>

  <div id="image-counter"></div>
</div>

<script>
const images = ["1.jpg","2.jpg","3.jpg","4.jpg"];
let currentIndex = 0;

function openLightbox(index){
  currentIndex = index;
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightbox-img").src = images[currentIndex];
  updateCounter();
}

function closeLightbox(){
  document.getElementById("lightbox").style.display = "none";
}

function nextImage(){
  currentIndex = (currentIndex + 1) % images.length;
  document.getElementById("lightbox-img").src = images[currentIndex];
  updateCounter();
}

function prevImage(){
  currentIndex = (currentIndex - 1 + images.length) % images.length;
  document.getElementById("lightbox-img").src = images[currentIndex];
  updateCounter();
}

function updateCounter(){
  document.getElementById("image-counter").textContent =
    (currentIndex+1) + " / " + images.length;
}

document.addEventListener("keydown", function(e){
  const lb = document.getElementById("lightbox");
  if(lb.style.display === "flex"){
    if(e.key === "ArrowLeft"){
      prevImage();
    }
    if(e.key === "ArrowRight"){
      nextImage();
    }
    if(e.key === "Escape"){
      closeLightbox();
    }
  }
});
</script>

</body>
</html>
